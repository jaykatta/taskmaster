spring.application.name=taskmaster
server.port=8080

# Default (production) datasource — MySQL. Values come from environment
# variables so no secrets are hard-coded / committed.
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/taskmaster}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:password}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Actuator — required for ECS/ALB health checks
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when-authorized

logging.level.com.taskmaster.taskmaster=INFO

